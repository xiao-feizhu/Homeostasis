<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent System - Yumi Live2D (Local)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 380px;
      height: 100vh;
      gap: 20px;
      padding: 20px;
    }
    .canvas-area {
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #live2d-canvas { width: 100%; height: 100%; }
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .controls-panel {
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
    }
    .panel {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
    }
    .panel h3 {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .expression-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .expr-btn {
      padding: 10px 8px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 12px;
    }
    .expr-btn:hover, .expr-btn.active { background: #4a9eff; }
    .status-pill {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .error-box {
      background: rgba(244, 67, 54, 0.2);
      border: 1px solid rgba(244, 67, 54, 0.5);
      padding: 15px;
      border-radius: 10px;
      font-size: 13px;
    }
    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="canvas-area">
      <canvas id="live2d-canvas"></canvas>
      <div class="status-pill">
        <span class="status-dot"></span>
        <span id="status-text">初始化中...</span>
      </div>
      <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <p>正在加载 Live2D...</p>
        <p style="font-size: 12px; opacity: 0.6;">使用本地依赖 (无需网络)</p>
      </div>
    </div>

    <div class="controls-panel">
      <div class="panel">
        <h3>🎭 表情控制</h3>
        <div class="expression-grid">
          <button class="expr-btn" onclick="setExpression('爱心眼')">❤️ 爱心</button>
          <button class="expr-btn" onclick="setExpression('黑脸')">⬛ 黑脸</button>
          <button class="expr-btn" onclick="setExpression('泪汪汪')">🥺 泪汪汪</button>
          <button class="expr-btn" onclick="setExpression('猫猫嘴')">😺 猫猫</button>
          <button class="expr-btn" onclick="setExpression('拿话筒')">🎤 话筒</button>
          <button class="expr-btn" onclick="setExpression('星星眼')">✨ 星星</button>
        </div>
      </div>

      <div class="panel">
        <h3>✅ 本地模式</h3>
        <div style="font-size: 12px; line-height: 1.8; opacity: 0.8;">
          <p>✓ 依赖已本地安装</p>
          <p>✓ 无需网络连接</p>
          <p>✓ 加载速度快</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 本地依赖 - 放在 lib 文件夹中 -->
  <script src="./lib/pixi.min.js"></script>
  <script src="./lib/index.min.js"></script>

  <script>
    const statusText = document.getElementById('status-text');
    let model = null;

    async function init() {
      try {
        // 检查依赖
        if (typeof PIXI === 'undefined') {
          throw new Error('PIXI 未加载 - 请检查 node_modules');
        }
        if (typeof PIXI.live2d === 'undefined' || !PIXI.live2d.Live2DModel) {
          throw new Error('pixi-live2d-display 未加载 - 请检查 node_modules');
        }

        console.log('✅ 本地依赖加载成功');
        console.log('PIXI version:', PIXI.VERSION);
        statusText.textContent = '加载模型...';

        // 创建应用
        const canvas = document.getElementById('live2d-canvas');
        const app = new PIXI.Application({
          view: canvas,
          resizeTo: canvas.parentElement,
          backgroundAlpha: 0,
          antialias: true,
          resolution: window.devicePixelRatio || 1,
          autoDensity: true
        });

        // 加载模型
        const modelPath = '../../yumi/yumi.model3.json';
        console.log('加载模型:', modelPath);

        model = await PIXI.live2d.Live2DModel.from(modelPath);

        // 添加到舞台
        app.stage.addChild(model);

        // 设置位置和大小
        model.anchor.set(0.5, 0.5);
        model.x = app.screen.width / 2;
        model.y = app.screen.height / 2;

        const scale = Math.min(
          app.screen.width / model.width,
          app.screen.height / model.height
        ) * 0.7;
        model.scale.set(scale);

        // 鼠标跟踪
        canvas.addEventListener('mousemove', (e) => {
          if (!model) return;
          const rect = canvas.getBoundingClientRect();
          const x = (e.clientX - rect.left) / rect.width * 2 - 1;
          const y = (e.clientY - rect.top) / rect.height * 2 - 1;
          model.focus(x, -y);
        });

        // 完成
        document.getElementById('loading').classList.add('hidden');
        statusText.textContent = 'Yumi 已就绪 (本地模式)';

        // 暴露到全局
        window.setExpression = setExpression;

        console.log('✅ 模型加载完成');

      } catch (error) {
        console.error('❌ 加载失败:', error);
        statusText.textContent = '加载失败';

        document.getElementById('loading').innerHTML = `
          <div class="error-box">
            <p><strong>❌ 加载失败</strong></p>
            <p style="margin-top: 8px; font-size: 12px;">${error.message}</p>
            <p style="margin-top: 8px; font-size: 11px; opacity: 0.7;">
              请确保已运行: npm install pixi.js pixi-live2d-display
            </p>
          </div>
          <button onclick="location.reload()" style="margin-top: 15px; padding: 10px 20px; border: none; border-radius: 8px; background: #4a9eff; color: white; cursor: pointer;">
            重新加载
          </button>
        `;
      }
    }

    function setExpression(exprName) {
      if (!model) {
        alert('模型尚未加载');
        return;
      }
      try {
        model.expression(exprName);
        statusText.textContent = `表情: ${exprName}`;

        document.querySelectorAll('.expr-btn').forEach(btn => {
          btn.classList.remove('active');
          if (btn.textContent.includes(exprName) ||
              (exprName === '爱心眼' && btn.textContent.includes('爱心')) ||
              (exprName === '黑脸' && btn.textContent.includes('黑脸')) ||
              (exprName === '泪汪汪' && btn.textContent.includes('泪汪汪')) ||
              (exprName === '猫猫嘴' && btn.textContent.includes('猫猫')) ||
              (exprName === '拿话筒' && btn.textContent.includes('话筒')) ||
              (exprName === '星星眼' && btn.textContent.includes('星星'))) {
            btn.classList.add('active');
          }
        });
      } catch (error) {
        console.error('设置表情失败:', error);
      }
    }

    // 启动
    init();
  </script>
</body>
</html>
