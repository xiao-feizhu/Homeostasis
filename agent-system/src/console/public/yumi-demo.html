<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent System - Yumi Live2D Demo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 380px;
      height: 100vh;
      gap: 20px;
      padding: 20px;
    }
    .canvas-area {
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #live2d-canvas { width: 100%; height: 100%; }
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
      padding: 40px;
      text-align: center;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .progress-bar {
      width: 300px;
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #4a9eff;
      width: 0%;
      transition: width 0.3s;
    }
    .controls-panel {
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
    }
    .panel {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
    }
    .panel h3 {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .expression-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .expr-btn {
      padding: 10px 8px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 12px;
    }
    .expr-btn:hover, .expr-btn.active { background: #4a9eff; }
    .status-pill {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .error-box {
      background: rgba(244, 67, 54, 0.2);
      border: 1px solid rgba(244, 67, 54, 0.5);
      padding: 15px;
      border-radius: 10px;
      font-size: 13px;
      max-width: 400px;
    }
    .timeout-box {
      background: rgba(255, 152, 0, 0.2);
      border: 1px solid rgba(255, 152, 0, 0.5);
      padding: 15px;
      border-radius: 10px;
      font-size: 13px;
      max-width: 400px;
    }
    .load-time {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 5px;
    }
    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="canvas-area">
      <canvas id="live2d-canvas"></canvas>
      <div class="status-pill">
        <span class="status-dot"></span>
        <span id="status-text">等待开始...</span>
      </div>
      <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <p id="loading-text">正在加载依赖库...</p>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <p class="load-time" id="load-time">已等待: 0s</p>
        <p style="font-size: 12px; opacity: 0.6;">Yumi (Cubism 3)</p>
      </div>
    </div>

    <div class="controls-panel">
      <div class="panel">
        <h3>🎭 表情控制</h3>
        <div class="expression-grid">
          <button class="expr-btn" onclick="setExpression('爱心眼')">❤️ 爱心</button>
          <button class="expr-btn" onclick="setExpression('黑脸')">⬛ 黑脸</button>
          <button class="expr-btn" onclick="setExpression('泪汪汪')">🥺 泪汪汪</button>
          <button class="expr-btn" onclick="setExpression('猫猫嘴')">😺 猫猫</button>
          <button class="expr-btn" onclick="setExpression('拿话筒')">🎤 话筒</button>
          <button class="expr-btn" onclick="setExpression('星星眼')">✨ 星星</button>
        </div>
      </div>

      <div class="panel">
        <h3>📊 加载时间参考</h3>
        <div style="font-size: 12px; line-height: 1.8; opacity: 0.8;">
          <p>⏱️ 正常网络: 2-5秒</p>
          <p>⏱️ 较慢网络: 5-15秒</p>
          <p>⏱️ 超时阈值: 30秒</p>
          <p style="margin-top: 10px; color: #4a9eff;">
            如果超过30秒仍未加载，请检查网络连接或尝试刷新页面。
          </p>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    const loadingText = document.getElementById('loading-text');
    const progressFill = document.getElementById('progress-fill');
    const loadTimeText = document.getElementById('load-time');
    const statusText = document.getElementById('status-text');

    let waitTime = 0;
    const waitInterval = setInterval(() => {
      waitTime++;
      loadTimeText.textContent = `已等待: ${waitTime}s`;

      // 更新进度条
      if (waitTime < 10) {
        progressFill.style.width = `${waitTime * 5}%`;
      }

      // 30秒超时
      if (waitTime >= 30) {
        clearInterval(waitInterval);
        showTimeout();
      }
    }, 1000);

    function showTimeout() {
      document.getElementById('loading').innerHTML = `
        <div class="timeout-box">
          <p><strong>⏱️ 加载超时</strong></p>
          <p style="margin-top: 8px; font-size: 12px;">
            加载时间超过30秒，可能是网络问题。
          </p>
          <p style="margin-top: 8px; font-size: 11px; opacity: 0.8;">
            建议：<br>
            1. 检查网络连接<br>
            2. 尝试使用 VPN<br>
            3. 使用简化版本
          </p>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
          <button onclick="location.reload()" style="padding: 10px 20px; border: none; border-radius: 8px; background: #4a9eff; color: white; cursor: pointer;">
            重新加载
          </button>
          <button onclick="location.href='simple-demo.html'" style="padding: 10px 20px; border: none; border-radius: 8px; background: rgba(255,255,255,0.2); color: white; cursor: pointer;">
            使用简化版
          </button>
        </div>
      `;
    }

    try {
      loadingText.textContent = '正在加载 PIXI.js...';
      const PIXI = await import('https://cdn.jsdelivr.net/npm/pixi.js@7.3.2/dist/pixi.mjs');
      progressFill.style.width = '30%';

      loadingText.textContent = '正在加载 Live2D 运行时...';
      const { Live2DModel } = await import('https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.5.0-lts/dist/index.mjs');
      progressFill.style.width = '60%';

      clearInterval(waitInterval);
      loadingText.textContent = '正在初始化...';

      // 初始化
      const canvas = document.getElementById('live2d-canvas');
      const app = new PIXI.Application({
        view: canvas,
        resizeTo: canvas.parentElement,
        backgroundAlpha: 0,
        antialias: true,
        resolution: window.devicePixelRatio || 1,
        autoDensity: true
      });

      progressFill.style.width = '80%';
      loadingText.textContent = '正在加载模型...';

      const model = await Live2DModel.from('../../yumi/yumi.model3.json');
      progressFill.style.width = '100%';

      app.stage.addChild(model);
      model.anchor.set(0.5, 0.5);
      model.x = app.screen.width / 2;
      model.y = app.screen.height / 2;

      const scale = Math.min(
        app.screen.width / model.width,
        app.screen.height / model.height
      ) * 0.7;
      model.scale.set(scale);

      // 鼠标跟踪
      canvas.addEventListener('mousemove', (e) => {
        if (!model) return;
        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width * 2 - 1;
        const y = (e.clientY - rect.top) / rect.height * 2 - 1;
        model.focus(x, -y);
      });

      // 完成
      document.getElementById('loading').classList.add('hidden');
      statusText.textContent = `Yumi 已就绪 (加载用时 ${waitTime}s)`;

      window.live2dModel = model;
      window.setExpression = (name) => {
        model.expression(name);
        statusText.textContent = `表情: ${name}`;
      };

    } catch (error) {
      clearInterval(waitInterval);
      document.getElementById('loading').innerHTML = `
        <div class="error-box">
          <p><strong>❌ 加载失败</strong></p>
          <p style="margin-top: 8px; font-size: 12px;">${error.message}</p>
          <p style="margin-top: 8px; font-size: 11px;">用时: ${waitTime}秒</p>
        </div>
        <div style="display: flex; gap: 10px; margin-top: 15px;">
          <button onclick="location.reload()" style="padding: 10px 20px; border: none; border-radius: 8px; background: #4a9eff; color: white; cursor: pointer;">
            重新加载
          </button>
          <button onclick="location.href='simple-demo.html'" style="padding: 10px 20px; border: none; border-radius: 8px; background: rgba(255,255,255,0.2); color: white; cursor: pointer;">
            使用简化版
          </button>
        </div>
      `;
    }
  </script>
</body>
</html>
