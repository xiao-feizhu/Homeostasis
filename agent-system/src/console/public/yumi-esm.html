<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Agent System - Yumi Live2D (ESM)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      min-height: 100vh;
      overflow: hidden;
    }
    .container {
      display: grid;
      grid-template-columns: 1fr 380px;
      height: 100vh;
      gap: 20px;
      padding: 20px;
    }
    .canvas-area {
      background: rgba(255,255,255,0.03);
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #live2d-canvas { width: 100%; height: 100%; }
    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 100;
      padding: 40px;
      text-align: center;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255,255,255,0.1);
      border-top-color: #4a9eff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .controls-panel {
      display: flex;
      flex-direction: column;
      gap: 15px;
      overflow-y: auto;
    }
    .panel {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
    }
    .panel h3 {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 15px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .expression-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .expr-btn {
      padding: 10px 8px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 12px;
    }
    .expr-btn:hover, .expr-btn.active { background: #4a9eff; }
    .status-pill {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .error-box {
      background: rgba(244, 67, 54, 0.2);
      border: 1px solid rgba(244, 67, 54, 0.5);
      padding: 15px;
      border-radius: 10px;
      font-size: 13px;
      max-width: 500px;
    }
    .debug-log {
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 8px;
      font-size: 11px;
      font-family: monospace;
      text-align: left;
      margin-top: 10px;
      max-height: 200px;
      overflow-y: auto;
      max-width: 500px;
      color: #aaa;
    }
    .method-badge {
      display: inline-block;
      background: #4a9eff;
      color: white;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      margin-left: 8px;
    }
    @media (max-width: 900px) {
      .container { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="canvas-area">
      <canvas id="live2d-canvas"></canvas>
      <div class="status-pill">
        <span class="status-dot"></span>
        <span id="status-text">初始化中...</span>
      </div>
      <div class="loading-overlay" id="loading">
        <div class="spinner"></div>
        <p id="loading-text">加载中...</p>
        <div class="debug-log" id="debug-log"></div>
      </div>
    </div>

    <div class="controls-panel">
      <div class="panel">
        <h3>🎭 表情控制</h3>
        <div class="expression-grid">
          <button class="expr-btn" data-expr="爱心眼">❤️ 爱心</button>
          <button class="expr-btn" data-expr="黑脸">⬛ 黑脸</button>
          <button class="expr-btn" data-expr="泪汪汪">🥺 泪汪汪</button>
          <button class="expr-btn" data-expr="猫猫嘴">😺 猫猫</button>
          <button class="expr-btn" data-expr="拿话筒">🎤 话筒</button>
          <button class="expr-btn" data-expr="星星眼">✨ 星星</button>
        </div>
      </div>

      <div class="panel">
        <h3>📋 技术说明 <span class="method-badge">ES Modules</span></h3>
        <div style="font-size: 12px; line-height: 1.6; opacity: 0.8;">
          <p>此版本参考 airi 项目，使用 ES Module 方式导入：</p>
          <pre style="background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; margin-top: 8px; overflow-x: auto;"><code>import { Application } from 'pixi.js';
import { Live2DModel } from 'pixi-live2d-display';</code></pre>
          <p style="margin-top: 8px;">使用 esm.sh CDN 提供 ES Module 支持</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 使用 esm.sh CDN 加载 ES Modules (自动处理依赖) -->
  <script type="module">
    // 使用 esm.sh 加载 ES Module 版本的 pixi.js 和 pixi-live2d-display
    // esm.sh 会自动处理所有 @pixi/xxx 子模块的依赖关系
    import { Application } from 'https://esm.sh/pixi.js@7.3.2';
    import { Live2DModel } from 'https://esm.sh/pixi-live2d-display@0.5.0-lts';

    const debugLog = document.getElementById('debug-log');
    const loadingText = document.getElementById('loading-text');

    function log(msg) {
      console.log(msg);
      debugLog.innerHTML += msg + '<br>';
    }

    async function init() {
      try {
        log('✅ ES Module 导入成功');
        log('Application 类型: ' + typeof Application);
        log('Live2DModel 类型: ' + typeof Live2DModel);

        loadingText.textContent = '初始化 PixiJS...';

        const canvas = document.getElementById('live2d-canvas');
        const app = new Application({
          view: canvas,
          resizeTo: canvas.parentElement,
          backgroundAlpha: 0,
          antialias: true,
          resolution: window.devicePixelRatio || 1,
          autoDensity: true
        });

        log('✅ PixiJS 应用创建成功');
        loadingText.textContent = '加载 Yumi 模型...';

        // 加载模型
        const modelPath = '../../yumi/yumi.model3.json';
        log('模型路径: ' + modelPath);

        const model = await Live2DModel.from(modelPath, {
          autoUpdate: true
        });

        log('✅ 模型加载成功');

        // 添加到舞台
        app.stage.addChild(model);

        // 设置模型位置和大小
        model.anchor.set(0.5, 0.5);
        model.x = app.screen.width / 2;
        model.y = app.screen.height / 2;

        const scale = Math.min(
          app.screen.width / model.width,
          app.screen.height / model.height
        ) * 0.7;
        model.scale.set(scale);

        log('✅ 模型初始化完成');

        // 鼠标跟踪
        canvas.addEventListener('mousemove', (e) => {
          if (!model) return;
          const rect = canvas.getBoundingClientRect();
          const x = (e.clientX - rect.left) / rect.width * 2 - 1;
          const y = (e.clientY - rect.top) / rect.height * 2 - 1;
          model.focus(x, -y);
        });

        // 隐藏加载层
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('status-text').textContent = 'Yumi 已就绪';

        // 绑定表情按钮
        document.querySelectorAll('.expr-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const expr = btn.dataset.expr;
            try {
              model.expression(expr);
              document.getElementById('status-text').textContent = '表情: ' + expr;
              document.querySelectorAll('.expr-btn').forEach(b => b.classList.remove('active'));
              btn.classList.add('active');
            } catch (e) {
              log('表情切换失败: ' + e.message);
            }
          });
        });

      } catch (error) {
        log('❌ 错误: ' + error.message);
        console.error(error);
        loadingText.textContent = '加载失败';
        document.getElementById('loading').innerHTML = `
          <div class="error-box">
            <p><strong>❌ 初始化失败</strong></p>
            <p style="margin-top: 8px; font-size: 12px;">${error.message}</p>
            <div class="debug-log">${debugLog.innerHTML}</div>
          </div>
          <button onclick="location.reload()" style="margin-top: 15px; padding: 10px 20px; border: none; border-radius: 8px; background: #4a9eff; color: white; cursor: pointer;">
            重新加载
          </button>
        `;
      }
    }

    // 启动
    init();
  </script>
</body>
</html>
